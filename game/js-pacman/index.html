<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>3D Dungeon Pac-Man</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        touch-action: none;
      }
      canvas {
        display: block;
      }
      #mobileControls {
        position: fixed;
        left: 50%;
        bottom: 16px;
        transform: translateX(-50%);
        display: none;
        grid-template-columns: 60px 60px 60px;
        grid-template-rows: 60px 60px;
        gap: 8px;
        z-index: 20;
        user-select: none;
      }
      .ctrlBtn {
        border: 0;
        border-radius: 12px;
        font-size: 24px;
        font-weight: bold;
        color: #fff;
        background: rgba(40, 40, 40, 0.72);
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
        touch-action: none;
      }
      .ctrlBtn:active {
        background: rgba(80, 80, 80, 0.85);
      }
      #btnUp {
        grid-column: 2;
        grid-row: 1;
      }
      #btnLeft {
        grid-column: 1;
        grid-row: 2;
      }
      #btnDown {
        grid-column: 2;
        grid-row: 2;
      }
      #btnRight {
        grid-column: 3;
        grid-row: 2;
      }
      @media (max-width: 900px), (pointer: coarse) {
        #mobileControls {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <div id="mobileControls" aria-label="Mobile movement controls">
      <button id="btnUp" class="ctrlBtn" data-key="ArrowUp">▲</button>
      <button id="btnLeft" class="ctrlBtn" data-key="ArrowLeft">◀</button>
      <button id="btnDown" class="ctrlBtn" data-key="ArrowDown">▼</button>
      <button id="btnRight" class="ctrlBtn" data-key="ArrowRight">▶</button>
    </div>
    <script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    <script src="game.js"></script>
  </body>
</html>
